name: Array API

on:
  push:
    branches:
      - maintenance/**
  pull_request:
    branches:
      - main
      - maintenance/**
  schedule:
  #        ┌───────────── minute (0 - 59)
  #        │  ┌───────────── hour (0 - 23)
  #        │  │  ┌───────────── day of the month (1 - 31)
  #        │  │  │  ┌───────────── month (1 - 12 or JAN-DEC)
  #        │  │  │  │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
  #        │  │  │  │ │
  - cron: "47 11 2/2 * *"

permissions:
  contents: read # to fetch code (actions/checkout)

env:
  CCACHE_DIR: "${{ github.workspace }}/.ccache"
  CCACHE_MAXSIZE: "250M"
  # Needed because Pixi doesn't set mtime for compilers
  CCACHE_COMPILERCHECK: "content"
  JAX_COMPILATION_CACHE_DIR: "${{ github.workspace }}/.cache/scipy_jax_cache"
  JAX_PERSISTENT_CACHE_MIN_COMPILE_TIME_SECS: "0"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  get_commit_message:
    name: Get commit message
    uses: ./.github/workflows/commit_message.yml

  xp_cpu:
    name: ${{ join(matrix.tasks, ' ') }}
    needs: get_commit_message
    if: >
      needs.get_commit_message.outputs.message == 1
      && (github.repository == 'scipy/scipy' || github.repository == '')
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - tasks: [test-strict, test-torch, test-torch-float32, test-dask]
            environments: [array-api-strict, torch-cpu, dask-cpu]
          - tasks: [test-jax]
            environments: [jax-cpu]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          pixi-version: v0.60.0
          cache: false
          environments: build-cpu ${{ join(matrix.environments, ' ') }}

      - name: Set up ccache
        uses: ./.github/ccache
        with:
          workflow_name: ${{ github.workflow }}
          job_name: ${{ github.job }}

      - name: Build
        run: pixi run build-cpu

      - name: Test
        run: |
          export OMP_NUM_THREADS=2
          for task in ${TASKS}; do
            pixi run --skip-deps "$task" -j 3 -- --durations 3 --timeout=120
          done
        env:
          TASKS: ${{ join(matrix.tasks, ' ') }}

      - name: Ccache performance
        shell: bash -l {0}
        run: |
          pixi exec ccache --evict-older-than 1d
          pixi exec ccache -s
