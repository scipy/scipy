# Workflow to build and test wheels.
# To work on the wheel building infrastructure on a fork, comment out:
#
# if: github.repository == 'scipy/scipy'
#
# in the get_commit_message job include [wheel build] in your commit
# message to trigger the build. All files related to wheel building are located
# at tools/wheels/
name: Wheel builder

on:
  push:
    branches:
      - maintenance/**
  pull_request:
    branches:
      - main
      - maintenance/**
  workflow_dispatch:

permissions:
   contents: read  # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  get_commit_message:
    name: Get commit message
    uses: ./.github/workflows/commit_message.yml

  build_wheels:
    name: Wheel, ${{ matrix.python[0] }}-${{ matrix.buildplat[1] }}
      ${{ matrix.buildplat[2] }} ${{ matrix.buildplat[3] }}
      ${{ matrix.buildplat[4] }}
    runs-on: ${{ matrix.buildplat[0] }}
    needs: get_commit_message
    if: >
      needs.get_commit_message.outputs.message == 1
      && (github.repository == 'scipy/scipy' || github.repository == '')

    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        # Github Actions doesn't support pairing matrix values together, let's improvise
        # https://github.com/github/feedback/discussions/7835#discussioncomment-1769026
        buildplat:
        # should also be able to do multi-archs on a single entry, e.g.
        # [windows-2025, win*, "AMD64 x86"]. However, those two require a different compiler setup
        # so easier to separate out here.
        - [ubuntu-22.04, manylinux, x86_64, "", ""]
        - [ubuntu-22.04, musllinux, x86_64, "", ""]
        - [ubuntu-24.04-arm, manylinux, aarch64, "", ""]
        - [ubuntu-24.04-arm, musllinux, aarch64, "", ""]
        - [macos-15-intel, macosx, x86_64, openblas, "10.14" ]
        - [macos-15-intel, macosx, x86_64, accelerate, "14.0" ]
        - [macos-14, macosx, arm64, openblas, "12.3"]
        - [macos-14, macosx, arm64, accelerate, "14.0"]
        - [windows-2025, win, AMD64, "", ""]
        - [windows-11-arm, win, ARM64, "", ""]
        python: [["cp312", "3.12"]]
        # python[0] is used to specify the python versions made by cibuildwheel

    steps:
      - name: Checkout scipy
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12

      - name: win_amd64 - configure rtools
        if: ${{ matrix.buildplat[1] == 'win' && matrix.buildplat[2] == 'AMD64' }}
        run: |
          # mingw-w64
          echo "c:\rtools45\ucrt64\bin;" >> $env:GITHUB_PATH

      - name: Set environment variables for ARM64
        if: matrix.buildplat[1] == 'win' && matrix.buildplat[2] == 'ARM64'
        run: |
            echo "CC=clang-cl" >> $env:GITHUB_ENV
            echo "CXX=clang-cl" >> $env:GITHUB_ENV
            echo "FC=flang" >> $env:GITHUB_ENV
            echo "TARGET_ARCH=${{ matrix.buildplat[2] }}" >> $env:GITHUB_ENV
   
      - name: Set up Flang and pkgconf for ARM64
        if: matrix.buildplat[1] == 'win' && matrix.buildplat[2] == 'ARM64'
        uses: ./.github/windows_arm64_steps

      - name: windows - set PKG_CONFIG_PATH
        if: ${{ matrix.buildplat[1] == 'win' }}
        run: |
          $CIBW = "${{ github.workspace }}/.openblas"
          # pkgconfig needs a complete path, and not just "./openblas since the
          # build is run in a tmp dir (?)
          # It seems somewhere in the env passing, `\` is not
          # passed through, so convert it to '/'
          $CIBW = $CIBW.replace("\","/")
          echo "CIBW_ENVIRONMENT_WINDOWS=PKG_CONFIG_PATH=$CIBW" >> $env:GITHUB_ENV

      # gfortran status for macOS
      # -------------------------
      # - arm64,  accelerate, >=14.0
      #     The easiest of them all (sort of). However, if you wish to target 14 you
      #     can only build on macos-14 with the system compiler. If you try building on
      #     macos-15 there are libraries with a minimum target of 15. Presumably when
      #     the macos-14 is dropped we'll need to customise the compiler a bit.
      #     In addition, we can't use Accelerate for < 14 because the library had bugs.
      #     This means OpenBLAS has to be used.
      # - x86_64, accelerate, >=14.0
      #     x86_64 is only available on the macos-15-intel image.
      #     Uses build from https://github.com/isuruf/gcc/releases/. The 15.2.0
      #     build is back compatible to macOS 14.
      # - x86_64, openblas, "10.14"
      #     x86_64 is only available on the macos-15-intel image.
      #     This can be made back compatible to macOS-10.14. The 15.2.0 build at
      #     https://github.com/isuruf/gcc/releases/ satisfies this.
      # - arm64, openblas, "12.3"
      #     We ideally want this back compatible to macOS-12. The build at
      #     https://github.com/fxcoudert/gfortran-for-macOS/releases/download/12.1-monterey/gfortran-ARM-12.1-Monterey.dmg
      #     satisfies those requirements.
      #     MACOS_DEPLOYMENT_TARGET has to be set to 12.3 (there's some reason why we
      #     don't support <12.3)
      #     OpenBLAS is also complicated because the `delocate` step tries
      #     to copy two libgfortran libraries into the wheel, and falls over. This
      #     necessitates using install_name_tool on the scipy_openblas32 dylibs.
      - name: Setup macOS
        if: startsWith( matrix.buildplat[0], 'macos-' )
        run: |        
          if [[ ${{ matrix.buildplat[3] }} == "accelerate" ]]; then
            echo CIBW_CONFIG_SETTINGS=\"setup-args=-Dblas=accelerate\" >> "$GITHUB_ENV"

            # Builds with Accelerate only target macOS>=14.0
            CIBW_ENV="CIBW_ENVIRONMENT_MACOS=MACOSX_DEPLOYMENT_TARGET=14.0 INSTALL_OPENBLAS=false"

            if [[ ${{ matrix.buildplat[2] }} == "arm64" ]]; then          
              # use preinstalled gfortran for Accelerate builds
              ln -s $(which gfortran-13) gfortran
              export PATH=$PWD:$PATH
              echo "PATH=$PATH" >> "$GITHUB_ENV"
              CIBW_ENV+=" INSTALL_GFORTRAN=false"
            else
              # x64_64. Can't use preinstalled fortran because it targets macOS15
              # Setting INSTALL_GFORTRAN=true causes the cibw_before_build script to install gfortran
              CIBW_ENV+=" INSTALL_GFORTRAN=true"
              CIBW_ENV+=" SDKROOT=$(xcrun --sdk macosx --show-sdk-path)"
            fi
          else
            CIBW_ENV="CIBW_ENVIRONMENT_MACOS=PKG_CONFIG_PATH=$PWD/.openblas \
              MACOSX_DEPLOYMENT_TARGET=${{ matrix.buildplat[4] }} \
              SDKROOT=$(xcrun --sdk macosx --show-sdk-path) \
              INSTALL_GFORTRAN=true"
          fi
          echo "$CIBW_ENV" >> "$GITHUB_ENV"

          PREFIX=DYLD_LIBRARY_PATH="\$(dirname \$(gfortran --print-file-name libgfortran.dylib))"
          CIBW="$PREFIX delocate-wheel -v $EXCLUDE --require-archs {delocate_archs} -w {dest_dir} {wheel}"
          echo "CIBW_REPAIR_WHEEL_COMMAND_MACOS=$CIBW" >> "$GITHUB_ENV"


      # - name: Inject environment variable for python dev version
      #   if: ${{ matrix.python[1] == '3.14-dev'
      #   shell: bash
      #   run: |
      #     # For dev versions of python need to use wheels from scientific-python-nightly-wheels
      #     # When the python version is released please comment out this section, but do not remove
      #     # (there will soon be another dev version to target).
      #     DEPS0="pip install --pre -i https://pypi.anaconda.org/scientific-python-nightly-wheels/simple numpy"
      #     DEPS1="pip install ninja meson-python pybind11 pythran cython"

      #     CIBW="$DEPS0;$DEPS1;bash {project}/tools/wheels/cibw_before_build_linux.sh {project}"
      #     echo "CIBW_BEFORE_BUILD_LINUX=$CIBW" >> "$GITHUB_ENV"

      #     CIBW="$DEPS0 && $DEPS1 && bash {project}/tools/wheels/cibw_before_build_win.sh {project}"
      #     echo "CIBW_BEFORE_BUILD_WINDOWS=$CIBW" >> "$GITHUB_ENV"

      #     CIBW="$DEPS0;$DEPS1;bash {project}/tools/wheels/cibw_before_build_macos.sh {project}"
      #     echo "CIBW_BEFORE_BUILD_MACOS=$CIBW" >> "$GITHUB_ENV"

      #     echo "CIBW_BEFORE_TEST=$DEPS0" >> "$GITHUB_ENV"

      #     CIBW="build; args: --no-isolation"
      #     echo "CIBW_BUILD_FRONTEND=$CIBW" >> "$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@298ed2fb2c105540f5ed055e8a6ad78d82dd3a7e # v3.3.1
        env:
          CIBW_BUILD: ${{ matrix.python[0] }}-${{ matrix.buildplat[1] }}*
          CIBW_ARCHS: ${{ matrix.buildplat[2] }}
          CIBW_ENABLE: cpython-freethreading cpython-prerelease

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ./wheelhouse/*.whl
          name: ${{ matrix.python[0] }}-${{ matrix.buildplat[1] }}
            ${{ matrix.buildplat[2] }} ${{ matrix.buildplat[3] }}
            ${{ matrix.buildplat[4] }}
