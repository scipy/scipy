name: Windows tests

on:
  push:
    branches:
      - maintenance/**
  pull_request:
    branches:
      - main
      - maintenance/**

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  get_commit_message:
    name: Get commit message
    uses: ./.github/workflows/commit_message.yml

  fast_spin:
    name: fast, py3.12/npAny, spin
    needs: get_commit_message
    # Ensure (a) this doesn't run on forks by default, and
    #        (b) it does run with Act locally (`github` doesn't exist there)
    if: >
      needs.get_commit_message.outputs.message == 1
      && (github.repository == 'scipy/scipy' || github.repository == '')
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          pixi-version: v0.56.0
          cache: false
          environments: >-
            build
            test

      - name: Build
        run: pixi run build

      - name: Test
        run: |
          # test runner parallel clashes with OpenBLAS multithreading
          $env:OPENBLAS_NUM_THREADS=1
          pixi run test -j4 -- --durations=25

  #############################################################################
  full_spin_min_numpy:
    name: full, py3.12/npMin, spin
    needs: get_commit_message
    if: >
      needs.get_commit_message.outputs.message == 1
      && (github.repository == 'scipy/scipy' || github.repository == '')
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "environment.yml"

      - name: Install rtools (mingw-w64)
        run: |
          choco install rtools -y --no-progress --force --version=4.0.0.20220206
          echo "c:\rtools40\ucrt64\bin;" >> $env:GITHUB_PATH

      - name: pip-packages
        run: |
          # 2.0.0 is currently our oldest supported NumPy version
          python -m pip install numpy==2.0.0 cython pybind11 pythran meson-python meson ninja pytest pytest-xdist pytest-timeout pooch spin hypothesis "click<8.3.0"
          python -m pip install -r requirements/openblas.txt

      - name: Build
        run: |
          spin build --with-scipy-openblas

      - name: Test
        run: |
          # test runner parallel clashes with OpenBLAS multithreading
          $env:OPENBLAS_NUM_THREADS=1
          spin test -j4 --mode full -- --durations=25 --timeout=60

  #############################################################################
  fast_spin_arm64:
    name: fast, py3.12/npAny, spin (Win-ARM64), no pythran
    runs-on: windows-11-arm
    needs: get_commit_message
    if: >
      needs.get_commit_message.outputs.message == 1 &&
      (github.repository == 'scipy/scipy' || github.repository == '')
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          architecture: "arm64"

      - name: Set up Flang and pkgconf for ARM64
        uses: ./.github/windows_arm64_steps

      - name: pip-packages
        run: |
          pip install numpy cython pybind11 meson ninja pytest pytest-xdist pytest-timeout pooch spin hypothesis "click<8.3.0"
          python -m pip install -r requirements/openblas.txt

      - name: Build
        run: |
          $env:cc = "clang-cl"
          $env:cxx = "clang-cl"
          $env:fc = "flang-new"
          spin build --with-scipy-openblas --setup-args="-Duse-pythran=false"

      - name: Test
        run: |
          $env:OPENBLAS_NUM_THREADS = 1
          spin test -j2 -- --durations=25
